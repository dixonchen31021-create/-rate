<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學數學速率智慧練習單 + 塗鴉計算區</title>
    <style>
        :root {
            --primary: #ffeb3b;
            --secondary: #e3f2fd;
            --accent: #ff5722;
            --text: #333;
            --success: #4caf50;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f0f9ff;
            color: var(--text);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }
        .container {
            flex: 1;
            min-width: 350px;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid var(--primary);
        }
        /* 畫板樣式 */
        .canvas-container {
            flex: 1;
            min-width: 350px;
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            border: 4px solid #81c784;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background: #fafafa;
            border: 2px solid #ddd;
            cursor: crosshair;
            touch-action: none;
            width: 100%;
            border-radius: 10px;
        }
        .canvas-tools {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        h1 { color: #1976d2; text-align: center; font-size: 1.5rem; }
        .tab-menu { display: flex; justify-content: space-around; margin-bottom: 15px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 10px; border: none; background: none; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: #1976d2; border-bottom: 4px solid #1976d2; }
        .logic-card { background: var(--secondary); padding: 12px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #2196f3; font-size: 0.9rem; }
        .question-bank { background: #fff8e1; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .question-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .q-btn { padding: 5px 10px; background: white; border: 1px solid #ffe082; border-radius: 15px; cursor: pointer; font-size: 0.85rem; }
        .q-btn.active { background: #ffe082; font-weight: bold; }
        .question-text { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #ccc; font-size: 0.95rem; }
        .input-zone { display: flex; flex-direction: column; gap: 10px; background: #fafafa; padding: 10px; border-radius: 10px; }
        input { width: 60px; padding: 5px; text-align: center; }
        button.calc-btn { background: var(--success); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .result-box { margin-top: 15px; padding: 15px; background: #fff3e0; border-radius: 10px; display: none; }
        .tool-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-clear { background: #e57373; color: white; }
        .btn-color { background: #64b5f6; color: white; }
    </style>
</head>
<body>

<h1>🚀 速率超人練習 + 計算塗鴉板</h1>

<div class="main-layout">
    <div class="container">
        <div class="tab-menu">
            <button class="tab-btn active" onclick="showTab('avg')">🔄 平均速率</button>
            <button class="tab-btn" onclick="showTab('meet')">🤝 相遇追趕</button>
            <button class="tab-btn" onclick="showTab('river')">🚣 流水問題</button>
        </div>

        <div id="avg" class="section active">
            <div class="logic-card">💡 <b>口訣：</b> 總路除總時，千萬別對半！</div>
            <div class="question-bank">
                <div class="question-buttons">
                    <button class="q-btn" onclick="loadQuestion('avg', 0)">🌱 上山下山</button>
                    <button class="q-btn" onclick="loadQuestion('avg', 1)">🌿 騎車郊遊</button>
                </div>
            </div>
            <div id="q_text_avg" class="question-text" style="display:none;"></div>
            <div class="input-zone">
                <div>去程：路 <input type="number" id="avg_d1"> km，速 <input type="number" id="avg_s1"></div>
                <div>回程：路 <input type="number" id="avg_d2"> km，速 <input type="number" id="avg_s2"></div>
            </div>
            <button class="calc-btn" style="margin-top:10px" onclick="calcAvg()">看計算步驟</button>
            <div id="res_avg" class="result-box"></div>
        </div>

        <div id="meet" class="section">內容同前，請依此類推...</div>
        <div id="river" class="section">內容同前，請依此類推...</div>
    </div>

    <div class="canvas-container">
        <h3>🎨 計算塗鴉區 (用筆或滑鼠寫字)</h3>
        <canvas id="paintCanvas" width="400" height="500"></canvas>
        <div class="canvas-tools">
            <button class="tool-btn btn-color" onclick="changeColor('#ff0000')">紅色筆</button>
            <button class="tool-btn btn-color" onclick="changeColor('#000000')">黑色筆</button>
            <button class="tool-btn btn-clear" onclick="clearCanvas()">全部擦掉</button>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">老師提示：可以在這裡列直式或畫圖喔！</p>
    </div>
</div>

<script>
    // --- 原有的分頁與計算邏輯 ---
    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- 畫板邏輯 ---
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    let painting = false;
    let color = "#000000";

    function startPosition(e) {
        painting = true;
        draw(e);
    }
    function finishedPosition() {
        painting = false;
        ctx.beginPath();
    }
    function draw(e) {
        if (!painting) return;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = color;

        // 取得正確的座標 (支援觸控與滑鼠)
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', finishedPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e.touches[0]); });
    canvas.addEventListener('touchend', finishedPosition);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function changeColor(c) { color = c; }

    // --- 載入題目與計算函數 (請保留您之前的函數) ---
    // ... 此處加入之前的 loadQuestion, calcAvg, calcMeet, calcRiver 函數 ...
</script>

</body>
</html>
